<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalScript</title>

<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai-sublime.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1a2e;
    --sidebar:   #16213e;
    --user-msg:  #0f3460;
    --bot-msg:   #252540;
    --accent:    #e94560;
    --accent2:   #c73652;
    --text:      #eeeeee;
    --muted:     #888;
    --border:    #2a2a4a;
    --input-bg:  #1e1e38;
    --radius:    10px;
  }

  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
               background: var(--bg); color: var(--text); }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 250px; min-width: 250px;
    background: var(--sidebar);
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }

  #new-chat-btn {
    margin: 12px; padding: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; font-size: 0.9rem; font-weight: 600;
    transition: background 0.2s;
  }
  #new-chat-btn:hover { background: var(--accent2); }

  #chat-list {
    flex: 1; overflow-y: auto;
    padding: 4px 8px;
  }
  #chat-list::-webkit-scrollbar { width: 4px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .chat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 10px; border-radius: var(--radius);
    cursor: pointer; margin-bottom: 3px;
    transition: background 0.15s;
    gap: 6px;
  }
  .chat-item:hover { background: rgba(255,255,255,0.06); }
  .chat-item.active { background: rgba(233,69,96,0.18); border: 1px solid rgba(233,69,96,0.4); }

  .chat-item-name {
    flex: 1; font-size: 0.85rem; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .chat-del-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.8rem; padding: 2px 5px;
    border-radius: 4px; flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .chat-del-btn:hover { color: var(--accent); background: rgba(233,69,96,0.15); }

  /* ── Main area ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 1rem; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    min-height: 52px;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.ok  { background: #4caf50; }
  #status-dot.deg { background: #ff9800; }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 78%;
  }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.9rem; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg-row.user     .msg-bubble { background: var(--user-msg); }
  .msg-row.assistant .msg-bubble { background: var(--bot-msg); }
  .msg-row.error    .msg-bubble { background: var(--bot-msg); border: 1px solid var(--accent); }

  /* code block inside message */
  .code-block-wrap {
    background: #23232f; border-radius: var(--radius);
    overflow: hidden; margin-top: 2px;
    border: 1px solid var(--border);
  }
  .code-toolbar {
    display: flex; gap: 6px;
    padding: 6px 10px;
    background: #1c1c28;
    border-bottom: 1px solid var(--border);
  }
  .code-toolbar button {
    padding: 3px 10px; font-size: 0.78rem;
    border: none; border-radius: 5px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-copy { background: #3a3a5a; color: var(--text); }
  .btn-run  { background: var(--accent); color: #fff; }
  .btn-copy:hover, .btn-run:hover { opacity: 0.8; }

  .code-block-wrap pre {
    margin: 0 !important; overflow-x: auto;
    font-size: 0.83rem !important;
  }
  .code-block-wrap pre code { border-radius: 0 !important; }

  .run-result {
    margin-top: 4px; padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 0.82rem; font-family: monospace;
    white-space: pre-wrap; word-break: break-all;
  }
  .run-result.ok  { background: #1a3a1a; border: 1px solid #2e6a2e; color: #9ddf9d; }
  .run-result.err { background: #3a1a1a; border: 1px solid #6a2e2e; color: #df9d9d; }

  /* thinking indicator */
  .thinking .msg-bubble { color: var(--muted); font-style: italic; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
         background: var(--muted); margin: 0 2px; vertical-align: middle;
         animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* empty state */
  #empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 10px;
    font-size: 0.95rem;
  }
  #empty-state .logo { font-size: 2.5rem; }

  /* ── Input bar ── */
  #input-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
  }

  #user-input {
    flex: 1; background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; font-size: 0.9rem;
    resize: none; min-height: 44px; max-height: 180px;
    outline: none; font-family: inherit;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

  #send-btn {
    height: 44px; padding: 0 18px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; font-size: 0.9rem; font-weight: 600;
    transition: background 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent2); }
  #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333355; color: var(--text); padding: 10px 20px;
    border-radius: 8px; font-size: 0.85rem; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <button id="new-chat-btn">+ Новый чат</button>
    <div id="chat-list"></div>
  </aside>

  <!-- Main -->
  <section id="main">
    <header id="chat-header">
      <span id="status-dot" title="Статус LLM"></span>
      <span id="chat-title">LocalScript</span>
    </header>

    <div id="messages">
      <div id="empty-state">
        <div class="logo">🖥️</div>
        <div>Выберите чат или создайте новый</div>
      </div>
    </div>

    <div id="input-bar">
      <textarea id="user-input" placeholder="Опишите задачу на Lua…" rows="1"
                disabled></textarea>
      <button id="send-btn" disabled>Отправить</button>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
const state = {
  chats: [],
  activeChatId: null,
  loading: false,
};

// ── DOM refs ──────────────────────────────────────────────────────────────
const chatList    = document.getElementById('chat-list');
const messagesEl  = document.getElementById('messages');
const emptyState  = document.getElementById('empty-state');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const chatTitle   = document.getElementById('chat-title');
const statusDot   = document.getElementById('status-dot');
const newChatBtn  = document.getElementById('new-chat-btn');
const toastEl     = document.getElementById('toast');

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ── API helpers ───────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  try {
    const res = await fetch('/api' + path, opts);
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`HTTP ${res.status}: ${txt}`);
    }
    if (res.status === 204) return null;
    return await res.json();
  } catch (e) {
    if (e.message.startsWith('HTTP')) throw e;
    throw new Error('Сервер недоступен. Проверьте что запущен.');
  }
}

// ── Health check ──────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const h = await api('GET', '/health');
    if (h.status === 'ok') {
      statusDot.className = 'ok';
      statusDot.title = 'LM Studio: OK';
    } else {
      statusDot.className = 'deg';
      statusDot.title = 'LM Studio: degraded';
    }
  } catch {
    statusDot.className = '';
    statusDot.title = 'Сервер недоступен';
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function renderSidebar() {
  chatList.innerHTML = '';
  state.chats.forEach(c => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (c.id === state.activeChatId ? ' active' : '');
    item.dataset.id = c.id;

    const name = document.createElement('span');
    name.className = 'chat-item-name';
    name.textContent = c.title;

    const del = document.createElement('button');
    del.className = 'chat-del-btn';
    del.textContent = '✕';
    del.title = 'Удалить чат';
    del.addEventListener('click', e => { e.stopPropagation(); deleteChat(c.id); });

    item.appendChild(name);
    item.appendChild(del);
    item.addEventListener('click', () => selectChat(c.id));
    chatList.appendChild(item);
  });
}

async function loadChats() {
  try {
    state.chats = await api('GET', '/chats');
    renderSidebar();
  } catch (e) {
    showToast(e.message);
  }
}

async function createChat() {
  try {
    const chat = await api('POST', '/chats', { title: 'Новый чат' });
    state.chats.unshift(chat);
    renderSidebar();
    await selectChat(chat.id);
  } catch (e) {
    showToast(e.message);
  }
}

async function deleteChat(id) {
  try {
    await api('DELETE', `/chats/${id}`);
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.activeChatId === id) {
      state.activeChatId = null;
      chatTitle.textContent = 'LocalScript';
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyState);
      setInputEnabled(false);
    }
    renderSidebar();
  } catch (e) {
    showToast(e.message);
  }
}

// ── Chat selection / messages ─────────────────────────────────────────────
async function selectChat(id) {
  state.activeChatId = id;
  const chat = state.chats.find(c => c.id === id);
  chatTitle.textContent = chat ? chat.title : id;
  renderSidebar();
  setInputEnabled(true);
  messagesEl.innerHTML = '';

  try {
    const msgs = await api('GET', `/chats/${id}/messages`);
    if (msgs.length === 0) {
      showEmptyChat();
    } else {
      msgs.forEach(m => appendMessage(m.role, m.content));
      scrollBottom();
    }
  } catch (e) {
    showToast(e.message);
  }
}

function showEmptyChat() {
  const hint = document.createElement('div');
  hint.style.cssText = 'color:var(--muted);text-align:center;margin:auto;font-size:0.9rem;padding:40px 0;';
  hint.textContent = 'Начните разговор — опишите задачу на Lua';
  messagesEl.appendChild(hint);
}

// ── Message rendering ─────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/**
 * Extract the first ```lua…``` (or ```) code block from text.
 * Returns { code, before, after } or null.
 */
function extractCodeBlock(text) {
  const m = text.match(/```lua\s*([\s\S]*?)```|```([\s\S]*?)```/);
  if (!m) return null;
  const code = (m[1] || m[2] || '').trim();
  const idx = text.indexOf(m[0]);
  return { code, before: text.slice(0, idx).trim(), after: text.slice(idx + m[0].length).trim() };
}

function buildCodeBlock(code) {
  const wrap = document.createElement('div');
  wrap.className = 'code-block-wrap';

  const toolbar = document.createElement('div');
  toolbar.className = 'code-toolbar';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn-copy';
  copyBtn.textContent = 'Копировать';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(code).then(() => showToast('Скопировано!'));
  });

  const runBtn = document.createElement('button');
  runBtn.className = 'btn-run';
  runBtn.textContent = '▶ Запустить';
  runBtn.addEventListener('click', () => runCode(code, resultDiv));

  toolbar.appendChild(copyBtn);
  toolbar.appendChild(runBtn);

  const pre = document.createElement('pre');
  const codeEl = document.createElement('code');
  codeEl.className = 'language-lua';
  codeEl.textContent = code;
  hljs.highlightElement(codeEl);
  pre.appendChild(codeEl);

  const resultDiv = document.createElement('div');

  wrap.appendChild(toolbar);
  wrap.appendChild(pre);
  wrap.appendChild(resultDiv);
  return wrap;
}

async function runCode(code, resultEl) {
  resultEl.className = 'run-result';
  resultEl.textContent = 'Выполняю…';
  try {
    const res = await api('POST', '/execute', { code });
    resultEl.className = 'run-result ' + (res.success ? 'ok' : 'err');
    let out = '';
    if (res.stdout) out += res.stdout;
    if (res.stderr) out += (out ? '\n' : '') + res.stderr;
    if (res.timed_out) out = '⏱ Превышен лимит времени выполнения';
    resultEl.textContent = out || (res.success ? '(нет вывода)' : '(ошибка без вывода)');
  } catch (e) {
    resultEl.className = 'run-result err';
    resultEl.textContent = e.message;
  }
}

function appendMessage(role, content, opts = {}) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (opts.error ? 'error' : role);

  if (opts.thinking) {
    row.classList.add('thinking');
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = 'Думаю <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  // Try to extract code block
  const cb = extractCodeBlock(content);
  if (role === 'assistant' && cb) {
    // Text before code
    if (cb.before) {
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = cb.before;
      row.appendChild(bubble);
    }
    row.appendChild(buildCodeBlock(cb.code));
    // Text after code
    if (cb.after) {
      const bubble2 = document.createElement('div');
      bubble2.className = 'msg-bubble';
      bubble2.style.marginTop = '4px';
      bubble2.textContent = cb.after;
      row.appendChild(bubble2);
    }
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (opts.error) bubble.style.borderColor = 'var(--accent)';
    bubble.textContent = content;
    row.appendChild(bubble);
  }

  messagesEl.appendChild(row);
  scrollBottom();
  return row;
}

function scrollBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !state.activeChatId || state.loading) return;

  state.loading = true;
  setInputEnabled(false);
  inputEl.value = '';
  autoResize();

  appendMessage('user', text);

  const thinkingRow = appendMessage('assistant', '', { thinking: true });

  try {
    const result = await api('POST', `/chats/${state.activeChatId}/messages`, { content: text });
    thinkingRow.remove();

    const role = 'assistant';
    appendMessage(role, result.response);

    // Update chat title if it's still default
    const chat = state.chats.find(c => c.id === state.activeChatId);
    if (chat && chat.title === 'Новый чат' && text.length <= 60) {
      chat.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
      renderSidebar();
    }
  } catch (e) {
    thinkingRow.remove();
    appendMessage('assistant', e.message, { error: true });
  } finally {
    state.loading = false;
    setInputEnabled(true);
    inputEl.focus();
  }
}

// ── Input helpers ─────────────────────────────────────────────────────────
function setInputEnabled(enabled) {
  inputEl.disabled = !enabled;
  sendBtn.disabled = !enabled;
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
}

// ── Event listeners ───────────────────────────────────────────────────────
newChatBtn.addEventListener('click', createChat);
sendBtn.addEventListener('click', sendMessage);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', autoResize);

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  await checkHealth();
  setInterval(checkHealth, 30_000);
  await loadChats();
  // If there are chats, select the first one
  if (state.chats.length > 0) {
    await selectChat(state.chats[0].id);
  }
})();
</script>
</body>
</html>
